name: CI

on:
  push:
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dw
          POSTGRES_PASSWORD: dw
          POSTGRES_DB: dw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dw"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30

    env:
      DATABASE_URL: postgresql+psycopg://dw:dw@localhost:5432/dw
      DW_MAX_ARTIFACT_BYTES: "10485760"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e '.[dev]'

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy derivation_web

      - name: Migrate
        run: alembic upgrade head

      - name: Pytest
        run: pytest -q
