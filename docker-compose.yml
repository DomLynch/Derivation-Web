services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dw
      POSTGRES_PASSWORD: dw
      POSTGRES_DB: dw
    ports:
      - "5432:5432"
    volumes:
      - dw_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dw"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  dw_pg:
