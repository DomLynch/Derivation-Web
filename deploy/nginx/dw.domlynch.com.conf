# /etc/nginx/sites-available/dw.domlynch.com.conf
# Derivation Web — provenance substrate
#
# Auth: API key on POST endpoints (returns 401 if missing/invalid).
# Reads remain open. Bodies up to ~10MB per the v1 artifact cap.
# Rate limit: see /etc/nginx/conf.d/dw-rate-limit.conf

server {
    listen 80;
    listen [::]:80;
    server_name dw.domlynch.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dw.domlynch.com;

    client_max_body_size 11m;

    ssl_certificate /etc/letsencrypt/live/dw.domlynch.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dw.domlynch.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Rate limiter: 5r/s sustained, 20-request burst per client IP.
    # Applied to all routes (API + web views). Hits get 503.
    limit_req zone=dw_api burst=20 nodelay;
    limit_req_status 429;

    location / {
        proxy_pass http://100.96.74.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
