# /etc/nginx/conf.d/dw-rate-limit.conf
#
# Rate-limit zone for derivation-web. Lives at the http context (not the
# server block) because nginx requires limit_req_zone to be defined once
# per shared memory zone. The dw vhost references it via `limit_req`.
#
# Tunable: rate=5r/s burst=20 nodelay
# - 5 req/sec sustained per client IP
# - 20-request burst allowed instantaneously
# - nodelay = burst is served immediately, rate kicks in after
# Researka's typical pattern (one POST per agent decision) sits well
# inside this. Raise rate= if real load justifies.

limit_req_zone $binary_remote_addr zone=dw_api:10m rate=5r/s;
